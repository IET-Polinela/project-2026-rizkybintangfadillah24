{% extends 'base.html' %}

{% block title %}Tambah Laporan{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{% url 'home' %}">Home</a>
        </li>
        <li class="breadcrumb-item">
            <a href="{% url 'report_list' %}">Reports</a>
        </li>
        <li class="breadcrumb-item active">Tambah Laporan</li>
    </ol>
</nav>

<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="mb-4">Tambah Laporan</h2>

        <form method="post" class="loading-form">
            {% csrf_token %}

            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Judul</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label for="{{ form.category.id_for_label }}" class="form-label">Kategori</label>
                {{ form.category }}
            </div>

            <div class="mb-3">
                <label for="{{ form.description.id_for_label }}" class="form-label">Deskripsi</label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label for="{{ form.location.id_for_label }}" class="form-label">Lokasi</label>
                {{ form.location }}
            </div>

            <button type="submit" class="btn btn-success submit-btn">
                Submit
            </button>
            <a href="{% url 'report_list' %}" class="btn btn-secondary">
                Kembali
            </a>
        </form>
    </div>
</div>
{% endblock %}
